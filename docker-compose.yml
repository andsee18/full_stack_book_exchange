services:
  localstack:
    container_name: localstack_bc
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
    volumes:
      - "./localstack:/var/lib/localstack:z"
    networks:
      - bookexchange-net
  backend:
    build: ./bookexchange_backend
    container_name: bookexchange-backend
    ports:
      - "5000:5000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/bookexchange.db
      - S3_ENDPOINT=http://localstack:4566
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
    depends_on:
      localstack:
        condition: service_started
    networks:
      - bookexchange-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/books/robots.txt"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    build: ./frontend
    container_name: bookexchange-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bookexchange-net
networks:
  bookexchange-net:
    driver: bridge
volumes:
  backend-data:
